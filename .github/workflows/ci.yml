name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    # Prisma `validate` and `generate` need DATABASE_URL to *exist* even
    # though CI never touches the database. A dummy URL is enough — the
    # real one lives in Render's env for production.
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
      NEXTAUTH_SECRET: "ci-dummy-secret-min-16-chars-long"
      NEXTAUTH_URL: "http://localhost:3020"
      BRIDGE_SERVER_TOKEN: "ci-dummy"
      BRIDGE_DATASET: "sfar"
      OPENAI_API_KEY: "ci-dummy"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Validate Prisma schema
        run: pnpm prisma validate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
