# Render Infrastructure as Code.
#
# This blueprint declares a Web Service + a daily Cron Job, both pointing at
# the existing managed Postgres `propscore`. Only NON-SECRET env vars live
# here — secrets are pushed straight from .env to Render via
# `pnpm render:sync` (see scripts/render-sync.ts) so the dashboard never
# needs to be touched after the initial blueprint deploy.

services:
  - type: web
    name: propscore-web
    runtime: node
    plan: starter
    region: ohio
    branch: main
    autoDeploy: true
    buildCommand: corepack enable && pnpm install --frozen-lockfile && NODE_OPTIONS=--max-old-space-size=4096 pnpm build
    startCommand: pnpm start
    preDeployCommand: pnpm prisma migrate deploy && pnpm db:seed
    healthCheckPath: /sign-in
    envVars:
      - key: NODE_ENV
        value: production
      - key: BRIDGE_DATASET
        value: sfar
      - key: BRIDGE_BASE_URL
        value: https://api.bridgedataoutput.com/api/v2/OData
      - key: OPENAI_MODEL
        value: gpt-5-mini

  - type: cron
    name: propscore-etl-nightly
    runtime: node
    region: ohio
    branch: main
    schedule: "0 3 * * *"
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm prisma generate
    # Single nightly orchestrator. Each step is delta-only (skips listings
    # already enriched) so AI tokens are spent on new listings only:
    #   etl:sync          — incremental Bridge pull (cursor-based)
    #   enrich:sfpim      — assessor (free Socrata API)
    #   enrich:vision     — gpt-5-mini vision (NEW listings only)
    #   enrich:listings   — gpt-5-mini text extract (NEW only)
    #   enrich:rent-comps — Bridge SFAR Residential Lease comps within 1mi/24mo,
    #                        bucketed by (beds, baths). Deterministic, no
    #                        LLM cost; refreshes every 7 days per listing.
    #   recompute:scores  — re-run heuristic so new enrichment data feeds the
    #                        value-add score (no AI calls, free).
    #   ai-score:changed  — gpt-5-mini opportunity score, delta-only via
    #                        Score.aiInputHash (~$0.001/listing scored).
    startCommand: pnpm nightly
    envVars:
      - key: NODE_ENV
        value: production
      - key: BRIDGE_DATASET
        value: sfar
      - key: BRIDGE_BASE_URL
        value: https://api.bridgedataoutput.com/api/v2/OData
      - key: OPENAI_MODEL
        value: gpt-5-mini
