# Render Infrastructure as Code.
#
# This blueprint declares a Web Service + a daily Cron Job, both pointing at
# the existing managed Postgres `propscore`. Only NON-SECRET env vars live
# here — secrets are pushed straight from .env to Render via
# `pnpm render:sync` (see scripts/render-sync.ts) so the dashboard never
# needs to be touched after the initial blueprint deploy.

services:
  - type: web
    name: propscore-web
    runtime: node
    plan: starter
    region: ohio
    branch: main
    autoDeploy: true
    buildCommand: corepack enable && pnpm install --frozen-lockfile && NODE_OPTIONS=--max-old-space-size=4096 pnpm build
    startCommand: pnpm start
    preDeployCommand: pnpm prisma migrate deploy && pnpm db:seed
    healthCheckPath: /sign-in
    envVars:
      - key: NODE_ENV
        value: production
      - key: BRIDGE_DATASET
        value: sfar
      - key: BRIDGE_BASE_URL
        value: https://api.bridgedataoutput.com/api/v2/OData
      - key: OPENAI_MODEL
        value: gpt-5-mini

  - type: cron
    name: propscore-etl-nightly
    runtime: node
    region: ohio
    branch: main
    schedule: "0 3 * * 2,6"
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm prisma generate
    # ETL + enrichment + heuristic recompute. AI opportunity scoring is
    # split into its own cron (`propscore-ai-score`) so it gets its own
    # timeout budget and can't be starved by upstream enrichment stages:
    #   etl:sync          — incremental Bridge pull (cursor-based)
    #   enrich:sfpim      — assessor (free Socrata API)
    #   enrich:vision     — gpt-5-mini vision (NEW listings only)
    #   enrich:listings   — gpt-5-mini text extract (NEW only)
    #   enrich:rent-comps — Bridge SFAR Residential Lease comps within 1mi/24mo,
    #                        bucketed by (beds, baths). Deterministic, no
    #                        LLM cost; refreshes every 7 days per listing.
    #   recompute:scores  — re-run heuristic so new enrichment data feeds the
    #                        value-add score (no AI calls, free).
    startCommand: pnpm nightly
    envVars:
      - key: NODE_ENV
        value: production
      - key: BRIDGE_DATASET
        value: sfar
      - key: BRIDGE_BASE_URL
        value: https://api.bridgedataoutput.com/api/v2/OData
      - key: OPENAI_MODEL
        value: gpt-5-mini

  - type: cron
    name: propscore-ai-score
    runtime: node
    region: ohio
    branch: main
    # Runs 1h after the main ETL nightly on the same days (Tue + Sat UTC),
    # so enrichment + heuristic recompute have a chance to land their
    # latest inputs before we hash + re-score. Dedicated cron so AI
    # scoring gets its own timeout budget and can't be starved by
    # upstream enrichment.
    schedule: "0 4 * * 2,6"
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm prisma generate
    # Delta-only: skips listings whose AI input payload hash is unchanged
    # since the last AI run. concurrency=10 keeps wall-clock under the
    # cron timeout (~3-5s/call × N listings ÷ 10).
    startCommand: pnpm ai-score:changed -- --concurrency=10
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-5-mini
