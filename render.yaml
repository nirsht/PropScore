# Render Infrastructure as Code.
#
# This blueprint declares a Web Service + a daily Cron Job, both pointing at
# the existing managed Postgres `propscore`. Only NON-SECRET env vars live
# here — secrets are pushed straight from .env to Render via
# `pnpm render:sync` (see scripts/render-sync.ts) so the dashboard never
# needs to be touched after the initial blueprint deploy.

services:
  - type: web
    name: propscore-web
    runtime: node
    plan: starter
    region: ohio
    branch: main
    autoDeploy: true
    buildCommand: npm install -g corepack@latest && corepack enable && pnpm install --frozen-lockfile && NODE_OPTIONS=--max-old-space-size=4096 pnpm build
    startCommand: pnpm start
    preDeployCommand: npm install -g corepack@latest && corepack enable && pnpm prisma migrate deploy && pnpm db:seed && pnpm seed:neighborhoods
    healthCheckPath: /sign-in
    envVars:
      - key: NODE_ENV
        value: production
      - key: BRIDGE_DATASET
        value: sfar
      - key: BRIDGE_BASE_URL
        value: https://api.bridgedataoutput.com/api/v2/OData
      - key: OPENAI_MODEL
        value: gpt-5-mini

  # Daily FREE refresh. Runs every day at 20:00 UTC = 12:00 PST (literal
  # UTC-8, year-round; fires at 1pm Pacific during DST). Pulls Bridge,
  # refreshes Socrata enrichments, zoning, walkscore, crime, neighborhood
  # comps, and recomputes the heuristic score. No OpenAI calls.
  #
  # Plan: `standard` (2 GiB RAM). The 4 parallel lanes in mode=base
  # (sfpim chain + rent-comps + walkscore + crime) OOM-killed at the
  # 512 MiB Starter ceiling — see Render event
  # `oomKilled: {memoryLimit: "512Mi"}` from 2026-06-28. Cron compute is
  # billed per execution minute, so this only costs more on the ~15 min/
  # day the job actually runs.
  - type: cron
    name: propscore-etl-daily
    runtime: node
    plan: standard
    region: ohio
    branch: main
    schedule: "0 20 * * *"
    buildCommand: npm install -g corepack@latest && corepack enable && pnpm install --frozen-lockfile && pnpm prisma generate
    # See scripts/nightly.ts (mode=base) for the full pipeline. Summary:
    #   etl:sync          — incremental Bridge pull (cursor-based)
    #   offboard:stale    — soft-delete listings no longer in Bridge
    #   enrich:sfpim/landuse/permits/zoning/code-enforcement/
    #     dbi-complaints/housing-inventory + compute:rent-control
    #                     — Socrata/PostGIS (free)
    #   enrich:rent-comps — Bridge SFAR lease comps (free, deterministic)
    #   refresh:walkscore — Walk Score free tier
    #   refresh:crime     — DataSF aggregates (free)
    #   refresh:neighborhood-comps — pure SQL aggregation
    #   recompute:scores  — heuristic baseline (no AI)
    startCommand: pnpm nightly:base
    envVars:
      - key: NODE_ENV
        value: production
      - key: BRIDGE_DATASET
        value: sfar
      - key: BRIDGE_BASE_URL
        value: https://api.bridgedataoutput.com/api/v2/OData
      - key: OPENAI_MODEL
        value: gpt-5-mini

  # PAID LLM refresh. Mon + Fri at 22:00 UTC — two hours after the daily
  # base finishes so it can build on the freshest non-LLM data. Re-runs
  # etl:sync first so the job is self-healing if the morning base failed.
  # OpenAI tokens spent here: vision, vision-interior, listing extract,
  # ai-score, and the Gmail rent-roll parser.
  #
  # Plan: `standard` for parity with the daily cron — vision + extract
  # also run in parallel and would OOM the same way on Starter.
  - type: cron
    name: propscore-etl-llm
    runtime: node
    plan: standard
    region: ohio
    branch: main
    schedule: "0 22 * * 1,5"
    buildCommand: npm install -g corepack@latest && corepack enable && pnpm install --frozen-lockfile && pnpm prisma generate
    # See scripts/nightly.ts (mode=llm) for the full pipeline. Summary:
    #   etl:sync                       — self-healing incremental pull
    #   enrich:vision → vision-interior — gpt-4o(-mini) photo analysis
    #   enrich:listings                — gpt-5-mini text extract
    #   enrich:contacts                — agent phone/email: Bridge → LLM
    #                                    agent (web_search) → Apollo fallback
    #   recompute:scores               — refresh heuristic for ai-score
    #   ai-score:changed               — gpt-5-mini, delta-only via hash
    #   emails:poll                    — gpt-5 rent-roll parser on inbox
    # enrich:contacts sources self-skip when their key is absent; the 30-day
    # freshness window bounds per-run cost. Needs APOLLO_API_KEY + TAVILY_API_KEY
    # in the cron env to use the paid steps.
    startCommand: pnpm nightly:llm
    envVars:
      - key: NODE_ENV
        value: production
      - key: BRIDGE_DATASET
        value: sfar
      - key: BRIDGE_BASE_URL
        value: https://api.bridgedataoutput.com/api/v2/OData
      - key: OPENAI_MODEL
        value: gpt-5-mini
